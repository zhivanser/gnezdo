version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gnezdo_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gnezdo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: gnezdo_api
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/gnezdo_db
      - SECRET_KEY=${SECRET_KEY:-super_secret_key_for_gnezdo_mvp_2026}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: gnezdo_client
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
